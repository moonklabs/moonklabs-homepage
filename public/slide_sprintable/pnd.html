<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Sprintable for P&D Solution · FineReport 구축 영업 발표</title>
<meta name="viewport" content="width=1920" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://rsms.me" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://esm.sh" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
<style>
/* ============================================================
   Design tokens — P&D Solution / FineReport (Navy + Teal)
============================================================ */
:root{
  --bg-marketing:#060a14; --bg-marketing-deep:#020408;
  --bg-panel:#0c1019; --bg-surface:#141924;
  --surface-alpha-1:rgba(255,255,255,.02);
  --surface-alpha-2:rgba(255,255,255,.04);
  --surface-alpha-3:rgba(255,255,255,.05);
  --surface-alpha-4:rgba(255,255,255,.08);
  --fg-1:#eef2f7; --fg-2:#c8d6e5; --fg-3:#7a8fa8; --fg-4:#4a5a70;
  --brand-primary:#06b6d4; --brand-deep:#0891b2;
  --brand-light:#67e8f9; --brand-soft:#a5f3fc;
  --status-success:#10b981; --status-warning:#f59e0b; --status-danger:#ef4444;
  --border-subtle:rgba(255,255,255,.04);
  --border-default:rgba(255,255,255,.07);
  --border-strong:rgba(255,255,255,.11);
  --font-sans:'Pretendard Variable','Inter Variable','Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','Apple SD Gothic Neo','Noto Sans KR',Roboto,'Helvetica Neue',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --font-features:"cv01","ss03";
}
html,body{margin:0;padding:0;background:#000;color:var(--fg-1);font-family:var(--font-sans);font-feature-settings:var(--font-features);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
*{box-sizing:border-box;font-feature-settings:var(--font-features)}
h1,h2,h3,p{margin:0}

/* ============================================================ Stage */
.stage-outer{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
.stage{position:relative;width:1920px;height:1080px;transform-origin:center;background:var(--bg-marketing);overflow:hidden;box-shadow:0 50px 160px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03)}
.scene{position:absolute;inset:0;animation:fadein .45s cubic-bezier(.2,.7,.2,1)}
@keyframes fadein{from{opacity:0;transform:scale(1.008)}to{opacity:1;transform:scale(1)}}
body.export *{animation-duration:0s!important;transition-duration:0s!important}
body.export .scene{opacity:1!important;transform:none!important}
.bg{position:absolute;inset:0;z-index:0}
.bg canvas{width:100%;height:100%;display:block}
.fg{position:absolute;inset:0;z-index:1;pointer-events:none}
.fg canvas{width:100%;height:100%;display:block}
.tx{position:absolute;inset:0;z-index:3;padding:92px 112px;display:flex;flex-direction:column}
.safe{position:relative;isolation:isolate}

/* ============================================================ Chrome */
.corner-mark{position:absolute;top:44px;right:64px;display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:20px;color:var(--fg-3);letter-spacing:.04em;z-index:6;white-space:nowrap}
.corner-mark .sep{color:var(--fg-4)}
.corner-mark .lg{width:22px;height:22px;border-radius:6px;background:var(--brand-primary);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.corner-foot{position:absolute;bottom:44px;left:112px;right:112px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:20px;color:var(--fg-4);letter-spacing:.04em;z-index:6;white-space:nowrap}

/* ============================================================ Common */
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 6px rgba(6,182,212,.15)}50%{box-shadow:0 0 0 12px rgba(6,182,212,.04)}}
@keyframes approve-breathe{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 12px rgba(16,185,129,0)}}
.eyebrow{font-family:var(--font-mono);font-size:24px;font-weight:500;color:var(--brand-primary);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:36px}
.eyebrow .dot{width:9px;height:9px;border-radius:50%;background:var(--brand-primary);box-shadow:0 0 0 6px rgba(6,182,212,.15);animation:pulse-dot 2.4s ease-in-out infinite}
.slide-title{font-size:68px;font-weight:510;line-height:1.06;letter-spacing:-1.8px;color:var(--fg-1);margin:0 0 28px 0;word-break:keep-all}
.slide-title em{color:var(--brand-primary);font-style:italic;font-weight:400}
.highlight-box{padding:24px 28px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.07);font-size:24px;line-height:1.4;font-weight:510;letter-spacing:-.2px;color:var(--fg-1)}
.highlight-box em{color:var(--brand-primary);font-style:italic;font-weight:400}

/* ============================================================ Cover (S01) */
.pnd-cover{padding:92px 112px 96px}
.pnd-cover-top{display:flex;align-items:center;gap:18px}
.pnd-logo{width:52px;height:52px;border-radius:14px;background:var(--brand-primary);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000;flex-shrink:0}
.pnd-cover-word{font-size:32px;font-weight:590;letter-spacing:-.5px;color:var(--fg-1)}
.pnd-cover-right{margin-left:auto;font-family:var(--font-mono);font-size:23px;color:var(--fg-3);text-align:right;line-height:1.5}
.pnd-cover-right .b{color:var(--fg-2)}
.pnd-cover-body{margin-top:auto}
.pnd-cover-kicker{font-family:var(--font-mono);font-size:24px;color:var(--brand-primary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px;animation:rise .9s .1s both}
.pnd-cover-h1{font-size:148px;font-weight:510;line-height:.96;letter-spacing:-4.5px;color:var(--fg-1);margin:0 0 36px}
.pnd-cover-h1 .line1{color:var(--fg-2);font-weight:400;animation:rise .9s .15s both;display:block}
.pnd-cover-h1 .line2{color:var(--brand-primary);font-style:italic;font-weight:400;display:block;animation:rise .9s .28s both}
.pnd-cover-sub{font-size:34px;font-weight:400;line-height:1.38;letter-spacing:-.4px;color:var(--fg-3);max-width:1380px;animation:rise 1s .5s both}
.pnd-cover-tag{display:inline-flex;align-items:center;gap:10px;margin-top:32px;padding:14px 22px;border-radius:10px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.22);font-family:var(--font-mono);font-size:21px;color:var(--brand-primary);letter-spacing:.03em;animation:rise 1s .7s both}
.pnd-cover-tag .arr{color:var(--fg-4);margin:0 2px}

/* ============================================================ Context (S02) */
.context-layout{display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:88px 112px;height:100%}
.context-left,.context-right{display:flex;flex-direction:column}
.context-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:32px;flex:1;align-content:start}
.ctx-card{background:rgba(12,16,25,.8);border:1px solid var(--border-default);border-radius:13px;padding:20px 22px;backdrop-filter:blur(10px);animation:rise .9s both;display:flex;flex-direction:column;gap:7px}
.ctx-card:nth-child(1){animation-delay:.1s}.ctx-card:nth-child(2){animation-delay:.22s}.ctx-card:nth-child(3){animation-delay:.34s}.ctx-card:nth-child(4){animation-delay:.46s}
.ctx-tag{font-family:var(--font-mono);font-size:14px;color:var(--fg-4);letter-spacing:.08em;text-transform:uppercase}
.ctx-fact{font-size:21px;font-weight:510;color:var(--fg-1);letter-spacing:-.2px;line-height:1.3}
.ctx-meaning{font-size:17px;color:var(--brand-primary);margin-top:3px}
.context-summary{margin-top:auto;padding:24px 26px;background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.18);border-radius:13px;animation:rise .9s .55s both}
.cs-kicker{font-family:var(--font-mono);font-size:17px;color:var(--brand-primary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.cs-body{font-size:22px;line-height:1.55;color:var(--fg-2)}
.cs-body strong{color:var(--fg-1);font-weight:510}
.context-source{margin-top:16px;font-family:var(--font-mono);font-size:14px;color:var(--fg-4)}

/* ============================================================ Translation (S03) */
.trans-layout{display:grid;grid-template-columns:1fr 120px 1fr;padding:88px 112px;height:100%;align-items:center;gap:0}
.trans-col{display:flex;flex-direction:column;gap:11px}
.trans-col-title{font-family:var(--font-mono);font-size:20px;color:var(--fg-4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.trans-item{padding:15px 18px;border-radius:9px;background:rgba(12,16,25,.8);border:1px solid var(--border-default);font-size:23px;color:var(--fg-2);line-height:1.3;animation:rise .9s both}
.trans-item.customer{border-color:rgba(6,182,212,.18);color:var(--fg-1)}
.trans-item:nth-child(2){animation-delay:.1s}.trans-item:nth-child(3){animation-delay:.2s}.trans-item:nth-child(4){animation-delay:.3s}
.trans-dev-item{animation-delay:.15s}.trans-dev-item:nth-child(3){animation-delay:.25s}.trans-dev-item:nth-child(4){animation-delay:.35s}.trans-dev-item:nth-child(5){animation-delay:.45s}.trans-dev-item:nth-child(6){animation-delay:.55s}.trans-dev-item:nth-child(7){animation-delay:.65s}.trans-dev-item:nth-child(8){animation-delay:.75s}
.trans-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:0 10px}
.trans-cost-badge{padding:9px 16px;border-radius:9999px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.28);font-family:var(--font-mono);font-size:17px;color:var(--brand-primary);white-space:nowrap;text-align:center;line-height:1.4}
.trans-arrow-wrap{display:flex;flex-direction:column;align-items:center;position:relative;flex:1;min-height:120px}
.trans-arrow-line{width:2px;flex:1;background:linear-gradient(to bottom,transparent,var(--brand-primary) 30%,var(--brand-primary) 70%,transparent)}
.trans-arrow-head{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:12px solid var(--brand-primary)}

/* ============================================================ Bottleneck (S04) */
.bn-layout{padding:80px 112px;display:flex;flex-direction:column;height:100%}
.bn-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:36px;flex:1;align-content:start}
.bn-card{background:rgba(12,16,25,.8);border:1px solid var(--border-default);border-radius:13px;padding:24px 28px;display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(10px);animation:rise .9s both}
.bn-card:nth-child(1){animation-delay:.1s}.bn-card:nth-child(2){animation-delay:.22s}.bn-card:nth-child(3){animation-delay:.34s}.bn-card:nth-child(4){animation-delay:.46s}
.bn-problem{font-size:25px;font-weight:510;color:var(--fg-1);line-height:1.3;letter-spacing:-.2px}
.bn-arr{font-family:var(--font-mono);font-size:18px;color:var(--fg-4)}
.bn-result{font-size:21px;color:var(--fg-3);line-height:1.35}
.bn-note{margin-top:auto;padding:18px 22px;border-left:3px solid var(--status-warning);background:rgba(245,158,11,.05);font-size:23px;color:var(--fg-2);line-height:1.4;animation:rise .9s .55s both}
.bn-note strong{color:var(--fg-1);font-weight:510}

/* ============================================================ Position (S05) */
.pos-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.pos-formula{padding:26px 34px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);border-radius:14px;margin-top:30px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;animation:rise .9s .1s both}
.pf-part{font-size:26px;font-weight:510;color:var(--fg-1);white-space:nowrap}
.pf-plus{font-size:32px;color:var(--brand-primary);font-weight:300}
.pos-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:24px}
.pos-card{background:rgba(12,16,25,.8);border:1px solid var(--border-default);border-radius:13px;padding:26px;display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(10px);animation:rise .9s both}
.pos-card:nth-child(1){animation-delay:.15s}.pos-card:nth-child(2){animation-delay:.27s}.pos-card:nth-child(3){animation-delay:.39s}
.pos-num{font-family:var(--font-mono);font-size:20px;color:var(--brand-primary);letter-spacing:.06em}
.pos-name{font-size:30px;font-weight:510;letter-spacing:-.4px;color:var(--fg-1);line-height:1.2}
.pos-desc{font-size:21px;line-height:1.5;color:var(--fg-3)}
.pos-message{margin-top:auto;padding:20px 26px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.07);font-size:24px;font-weight:510;color:var(--fg-1);letter-spacing:-.2px;line-height:1.4;animation:rise .9s .5s both}
.pos-message em{color:var(--brand-primary);font-style:italic;font-weight:400}

/* ============================================================ Workflow (S06) */
.wf-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.wf-timeline{display:flex;align-items:stretch;gap:0;margin-top:48px;flex:1;max-height:480px}
.wf-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;position:relative}
.wf-step:not(:last-child)::after{content:"→";position:absolute;right:-30px;top:28px;font-size:32px;color:var(--fg-4);z-index:2;font-family:var(--font-mono)}
.wf-badge{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:26px;font-weight:510;flex-shrink:0}
.wf-badge.normal{background:rgba(255,255,255,.05);border:2px solid var(--border-default);color:var(--fg-3)}
.wf-badge.teal{background:rgba(6,182,212,.12);border:2px solid var(--brand-primary);color:var(--brand-primary);box-shadow:0 0 24px rgba(6,182,212,.28);animation:pulse-dot 2s ease-in-out infinite}
.wf-card{background:rgba(12,16,25,.8);border:1px solid var(--border-default);border-radius:13px;padding:20px 16px;width:100%;text-align:center;flex:1;backdrop-filter:blur(10px);animation:rise .9s both;display:flex;flex-direction:column;gap:8px}
.wf-card.teal{border-color:rgba(6,182,212,.32);background:rgba(6,182,212,.06)}
.wf-step:nth-child(1) .wf-card{animation-delay:.1s}.wf-step:nth-child(2) .wf-card{animation-delay:.2s}.wf-step:nth-child(3) .wf-card{animation-delay:.3s}.wf-step:nth-child(4) .wf-card{animation-delay:.4s}.wf-step:nth-child(5) .wf-card{animation-delay:.5s}
.wf-name{font-size:22px;font-weight:510;color:var(--fg-1);letter-spacing:-.2px;line-height:1.3}
.wf-name.teal{color:var(--brand-primary)}
.wf-desc{font-size:17px;color:var(--fg-3);line-height:1.4}
.wf-key{margin-top:auto;display:flex;align-items:center;gap:14px;padding:16px 22px;background:rgba(6,182,212,.06);border:1px dashed rgba(6,182,212,.22);border-radius:11px;font-size:21px;color:var(--fg-2);animation:rise .9s .62s both}
.wf-key strong{color:var(--brand-primary);font-weight:510}

/* ============================================================ Demo Intro (S07) */
.demo-intro-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.demo-kicker{font-family:var(--font-mono);font-size:24px;color:var(--brand-primary);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:40px}
.demo-kicker .live{width:11px;height:11px;border-radius:50%;background:var(--status-success);box-shadow:0 0 0 5px rgba(16,185,129,.2);animation:pulse-dot 1.8s ease-in-out infinite}
.scenario-card{background:rgba(12,16,25,.85);border:1px solid var(--border-default);border-radius:15px;padding:36px 44px;flex:1;display:flex;flex-direction:column;gap:24px;backdrop-filter:blur(14px);animation:rise .9s .12s both}
.sc-label{font-family:var(--font-mono);font-size:18px;color:var(--fg-4);letter-spacing:.1em;text-transform:uppercase}
.sc-quote{font-size:30px;line-height:1.58;color:var(--fg-1);letter-spacing:-.25px;padding-left:22px;border-left:3px solid var(--brand-primary)}
.sc-note{margin-top:auto;font-size:24px;color:var(--fg-3);padding:18px 22px;background:rgba(6,182,212,.06);border-radius:11px;line-height:1.5}
.sc-note strong{color:var(--fg-1);font-weight:510}
.demo-tags{display:flex;gap:14px;margin-top:18px;flex-wrap:wrap}
.demo-tag{padding:9px 18px;border-radius:9999px;font-family:var(--font-mono);font-size:17px;background:rgba(12,16,25,.8);border:1px solid var(--border-default);color:var(--fg-3)}
.demo-tag.active{border-color:rgba(6,182,212,.35);color:var(--brand-primary);background:rgba(6,182,212,.08)}

/* ============================================================ Demo Slides (S08-S12) */
.demo-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.demo-split{display:grid;grid-template-columns:1fr 1fr;gap:44px;flex:1;margin-top:28px}
.demo-single{flex:1;margin-top:28px}
.demo-desc{font-size:24px;line-height:1.5;color:var(--fg-2);margin-bottom:24px}
.demo-desc strong{color:var(--fg-1);font-weight:510}
.ui-panel{background:rgba(8,12,20,.95);border:1px solid var(--border-default);border-radius:13px;overflow:hidden;animation:rise .9s .15s both;height:100%}
.ui-head{display:flex;gap:7px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border-subtle);background:rgba(255,255,255,.02)}
.ui-head .d{width:9px;height:9px;border-radius:50%;background:var(--border-strong)}
.ui-head .t{margin-left:auto;font-family:var(--font-mono);font-size:14px;color:var(--brand-primary);display:flex;align-items:center;gap:7px}
.ui-head .t::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--status-success);animation:pulse-dot 2s infinite}
.ui-body{padding:20px 22px;display:flex;flex-direction:column;gap:12px}
/* form fields */
.mf{display:flex;flex-direction:column;gap:5px}
.mf-lbl{font-family:var(--font-mono);font-size:13px;color:var(--fg-4);letter-spacing:.06em;text-transform:uppercase}
.mf-val{padding:10px 14px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid var(--border-strong);font-size:18px;color:var(--fg-1)}
.mf-val.teal{border-color:rgba(6,182,212,.28);color:var(--brand-light)}
/* plan report */
.report-section{padding:12px 14px;border-radius:7px;background:rgba(255,255,255,.03);border:1px solid var(--border-subtle);display:flex;flex-direction:column;gap:6px}
.rs-head{font-family:var(--font-mono);font-size:12px;color:var(--brand-primary);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.rs-head::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--brand-primary);animation:pulse-dot 2s infinite}
.rs-body{font-size:16px;color:var(--fg-2);line-height:1.45}
.risk-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:9999px;font-family:var(--font-mono);font-size:12px;margin:2px}
.risk-badge.high{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.risk-badge.med{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#f59e0b}
/* approval diff */
.approval-bar{padding:10px 14px;border-radius:7px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.22);font-family:var(--font-mono);font-size:14px;color:var(--brand-primary);display:flex;align-items:center;gap:8px}
.approval-bar::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--brand-primary);animation:pulse-dot 1.8s infinite}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.diff-col{padding:11px 13px;border-radius:7px;font-size:15px;line-height:1.4;display:flex;flex-direction:column;gap:5px}
.diff-col.before{background:rgba(255,255,255,.03);border:1px solid var(--border-subtle);color:var(--fg-3)}
.diff-col.after{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.22);color:var(--fg-2)}
.diff-tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.diff-tag.before{color:var(--fg-4)}.diff-tag.after{color:var(--brand-primary)}
.approve-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.approve-btn{padding:12px;border-radius:7px;font-size:18px;font-weight:510;text-align:center}
.approve-btn.go{background:var(--status-success);color:#fff;animation:approve-breathe 2.6s ease-in-out infinite}
.approve-btn.req{background:rgba(255,255,255,.07);border:1px solid var(--border-default);color:var(--fg-2)}
/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;height:100%}
.kb-col{background:rgba(255,255,255,.02);border-radius:9px;padding:9px;display:flex;flex-direction:column;gap:5px}
.kb-hd{font-family:var(--font-mono);font-size:13px;color:var(--fg-4);letter-spacing:.05em;padding:7px 9px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.kb-hd .cnt{min-width:18px;height:18px;border-radius:9px;background:rgba(255,255,255,.07);display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg-3)}
.kb-card{padding:9px 11px;border-radius:6px;background:rgba(12,16,25,.9);border:1px solid var(--border-subtle);font-size:14px;color:var(--fg-2);line-height:1.3}
.kb-card.hl{border-color:rgba(6,182,212,.28);color:var(--fg-1)}
.kb-t{display:inline-block;margin-top:4px;padding:2px 7px;border-radius:9999px;font-family:var(--font-mono);font-size:10px}
.kb-t.dev{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.28);color:#10b981}
.kb-t.doc{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#f59e0b}
.kb-t.con{background:rgba(6,182,212,.09);border:1px solid rgba(6,182,212,.22);color:var(--brand-primary)}
/* doc list */
.doc-list{display:flex;flex-direction:column;gap:7px}
.doc-item{padding:11px 14px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--border-subtle);display:flex;align-items:center;gap:11px;font-size:17px;color:var(--fg-2)}
.doc-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2)}
.doc-badge{margin-left:auto;font-family:var(--font-mono);font-size:11px;padding:2px 7px;border-radius:9999px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);color:var(--brand-primary);white-space:nowrap}

/* ============================================================ Trust (S13) */
.trust-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.trust-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:36px;flex:1;align-content:start}
.trust-card{background:rgba(12,16,25,.8);border:1px solid var(--border-default);border-radius:13px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(12px);animation:rise .9s both;position:relative;overflow:hidden}
.trust-card:nth-child(1){animation-delay:.1s}.trust-card:nth-child(2){animation-delay:.22s}.trust-card:nth-child(3){animation-delay:.34s}.trust-card:nth-child(4){animation-delay:.46s}
.trust-card::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--brand-primary);opacity:.55}
.tc-num{font-family:var(--font-mono);font-size:19px;color:var(--brand-primary);letter-spacing:.06em}
.tc-title{font-size:30px;font-weight:510;color:var(--fg-1);letter-spacing:-.35px;line-height:1.2}
.tc-desc{font-size:20px;line-height:1.45;color:var(--fg-3)}
.trust-msg{margin-top:auto;padding:18px 24px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.06);font-size:23px;color:var(--fg-2);line-height:1.4;animation:rise .9s .55s both}
.trust-msg strong{color:var(--fg-1);font-weight:510}

/* ============================================================ Pilot (S14) */
.pilot-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.pilot-card{background:rgba(12,16,25,.8);border:1px solid var(--border-default);border-radius:15px;padding:0 36px;margin-top:32px;flex:1;max-height:580px;backdrop-filter:blur(14px);animation:rise .9s .12s both;display:flex;flex-direction:column;overflow:hidden}
.pilot-row{display:grid;grid-template-columns:160px 1fr;gap:14px;padding:18px 0;border-bottom:1px solid var(--border-subtle);align-items:start}
.pilot-row:last-child{border-bottom:none}
.pr-k{font-family:var(--font-mono);font-size:16px;color:var(--fg-4);letter-spacing:.06em;text-transform:uppercase;padding-top:3px}
.pr-v{font-size:22px;color:var(--fg-1);line-height:1.4}
.pr-v .chip{display:inline-flex;align-items:center;padding:3px 11px;border-radius:9999px;font-family:var(--font-mono);font-size:14px;background:rgba(6,182,212,.09);border:1px solid rgba(6,182,212,.22);color:var(--brand-primary);margin-right:7px;margin-bottom:4px}
.pilot-msg{margin-top:auto;padding:18px 22px;background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.18);border-radius:11px;font-size:23px;color:var(--fg-2);animation:rise .9s .48s both;line-height:1.45}
.pilot-msg strong{color:var(--brand-primary);font-weight:510}

/* ============================================================ Action (S15) */
.action-layout{padding:78px 112px;display:grid;grid-template-columns:1fr 1fr;gap:56px;height:100%}
.action-left,.action-right{display:flex;flex-direction:column}
.action-steps{display:flex;flex-direction:column;gap:14px;margin-top:28px}
.act-step{display:flex;align-items:flex-start;gap:18px;padding:18px 22px;border-radius:11px;background:rgba(12,16,25,.8);border:1px solid var(--border-default);animation:rise .9s both}
.act-step:nth-child(1){animation-delay:.1s}.act-step:nth-child(2){animation-delay:.22s}.act-step:nth-child(3){animation-delay:.34s}.act-step:nth-child(4){animation-delay:.46s}
.act-num{width:44px;height:44px;border-radius:50%;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.28);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:20px;color:var(--brand-primary);flex-shrink:0}
.act-body{flex:1}
.act-title{font-size:22px;font-weight:510;color:var(--fg-1);letter-spacing:-.2px;margin-bottom:3px}
.act-sub{font-size:17px;color:var(--fg-3)}
.action-criteria{margin-top:24px;flex:1}
.ac-title{font-family:var(--font-mono);font-size:16px;color:var(--fg-4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.ac-list{display:flex;flex-direction:column;gap:7px}
.ac-item{display:flex;align-items:center;gap:11px;font-size:20px;color:var(--fg-2);padding:9px 13px;border-radius:7px;background:rgba(255,255,255,.02)}
.ac-item::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--brand-primary);flex-shrink:0}
.action-closing{margin-top:auto;padding:22px 26px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.07);font-size:21px;line-height:1.55;color:var(--fg-1);animation:rise .9s .55s both}
.action-closing em{color:var(--brand-primary);font-style:italic}

/* ============================================================ Backup */
.backup-layout{padding:78px 112px;display:flex;flex-direction:column;height:100%}
.backup-badge{font-family:var(--font-mono);font-size:16px;color:var(--status-warning);letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:9999px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);display:inline-flex;margin-bottom:12px;width:fit-content}
.backup-table{margin-top:24px;flex:1;display:flex;flex-direction:column;background:rgba(12,16,25,.7);border:1px solid var(--border-default);border-radius:13px;overflow:hidden;animation:rise .9s .12s both}
.bt-row{display:grid;padding:15px 22px;border-bottom:1px solid var(--border-subtle);align-items:start}
.bt-row.col2{grid-template-columns:280px 1fr}
.bt-row.col3{grid-template-columns:240px 1fr 1fr}
.bt-row:last-child{border-bottom:none}
.bt-row.hd-row{background:rgba(255,255,255,.025);padding:12px 22px}
.bt-k{font-family:var(--font-mono);font-size:15px;color:var(--fg-4);letter-spacing:.04em;line-height:1.4}
.bt-k.hd{color:var(--brand-primary);font-size:13px;letter-spacing:.1em;text-transform:uppercase}
.bt-v{font-size:20px;color:var(--fg-2);line-height:1.4}
.bt-v.hd{color:var(--fg-4);font-size:13px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
.bt-v strong{color:var(--fg-1)}
.qa-q{font-size:20px;font-weight:510;color:var(--fg-1);margin-bottom:5px}
.qa-a{font-size:17px;color:var(--fg-3);line-height:1.4}

/* ============================================================ Section Dividers */
.divider{justify-content:center;padding:96px 112px;background:#000}
.divider-label{font-family:var(--font-mono);font-size:26px;color:var(--fg-3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:44px}
.divider-num{font-size:400px;font-weight:510;line-height:.84;letter-spacing:-13px;color:#fff;margin:0;display:flex;align-items:flex-start;gap:28px}
.divider-num .slash{font-size:300px;color:var(--fg-4);font-weight:400}
.divider-num .total{font-size:130px;color:var(--fg-4);font-weight:400;align-self:flex-end;margin-bottom:38px;letter-spacing:-3.5px}
.divider-title{font-size:88px;font-weight:510;line-height:1.0;letter-spacing:-2.4px;color:#fff;margin:36px 0 0;max-width:1400px}
.divider-title em{color:var(--brand-primary);font-style:italic;font-weight:400}
.divider-sub{font-size:30px;line-height:1.5;color:var(--fg-3);margin:28px 0 0;max-width:1360px;letter-spacing:-.25px}
.divider-progress{position:absolute;bottom:88px;left:112px;right:112px;display:flex;gap:10px;font-family:var(--font-mono);font-size:17px;color:var(--fg-4);align-items:center;z-index:4}
.divider-progress .track{display:flex;gap:7px;margin-left:auto}
.divider-progress .seg{width:54px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;transition:background .4s}
.divider-progress .seg.active{background:var(--brand-primary);box-shadow:0 0 16px rgba(6,182,212,.42)}
.divider-progress .seg.done{background:var(--fg-4)}

/* ============================================================ HUD + progress */
.progress-track{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.05);z-index:998}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--brand-primary),var(--brand-light));transition:width .5s cubic-bezier(.4,0,.2,1)}
.hud{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);z-index:999;display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,.85);border:1px solid var(--border-strong);border-radius:9999px;backdrop-filter:blur(20px);color:var(--fg-2);font-family:var(--font-mono);font-size:13px;opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;user-select:none}
.hud[data-show]{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.hud .btn{appearance:none;border:0;background:transparent;color:var(--fg-3);height:28px;min-width:28px;padding:0 6px;border-radius:9999px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,color .2s;font:inherit}
.hud .btn:hover{background:rgba(255,255,255,.1);color:var(--fg-1)}
.hud .count{min-width:54px;text-align:center;color:var(--fg-1);font-variant-numeric:tabular-nums}
.hud .sep{color:var(--fg-4)}
.hud .label{color:var(--fg-3);padding:0 8px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hud svg{width:14px;height:14px;display:block}

@page{size:1920px 1080px;margin:0}
@media print{
  html,body{margin:0;padding:0;overflow:visible;height:auto}
  .stage-outer{position:static;display:block}
  .stage{width:1920px;height:1080px;transform:none!important;box-shadow:none;margin:0;break-after:page}
  .hud,.progress-track{display:none!important}
  *{animation:none!important;transition:none!important}
}

/* ============================================================
   Sprintable System Intro Slides — Cover · Hook · What · How · Story
============================================================ */
/* Cover */
.cover{padding:92px 112px 96px}
.cover-top{display:flex;align-items:center;gap:18px}
.cover-mark{width:52px;height:52px;border-radius:14px;object-fit:contain;display:block}
.cover-word{font-size:32px;font-weight:590;letter-spacing:-.5px;color:var(--fg-1)}
.cover-top-right{margin-left:auto;font-family:var(--font-mono);font-size:24px;color:var(--fg-3);text-align:right;line-height:1.45}
.cover-top-right .b{color:var(--fg-2)}
.cover-title-group{margin-top:auto}
.cover-kicker{font-family:var(--font-mono);font-size:26px;color:var(--brand-primary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:36px}
.cover-title{font-size:186px;font-weight:510;line-height:.96;letter-spacing:-5.2px;color:var(--fg-1);margin:0 0 40px 0}
.cover-title .run-the{color:var(--fg-2);font-weight:400;animation:rise .9s .1s cubic-bezier(.2,.7,.2,1) both}
.cover-title .sprint{color:var(--fg-1);display:inline-block;animation:rise .9s .25s cubic-bezier(.2,.7,.2,1) both}
.cover-title .review{color:var(--brand-primary);font-style:italic;font-weight:400;display:inline-block;animation:rise .9s .45s cubic-bezier(.2,.7,.2,1) both}
.cover-sub{font-size:38px;font-weight:400;line-height:1.32;letter-spacing:-.6px;color:var(--fg-3);max-width:1400px;animation:rise 1s .7s cubic-bezier(.2,.7,.2,1) both}
.cover-meta{display:flex;gap:64px;margin-top:44px;font-family:var(--font-mono);font-size:24px;color:var(--fg-3);animation:rise 1s .9s cubic-bezier(.2,.7,.2,1) both}
.cover-meta .k{color:var(--fg-4);margin-right:12px}

/* Hook */
.hook{justify-content:center;align-items:flex-start}
.hook-kicker{font-family:var(--font-mono);font-size:26px;color:var(--fg-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:64px;display:flex;align-items:center;gap:14px}
.hook-kicker .line{display:inline-block;width:64px;height:1px;background:var(--border-strong)}
.hook-title{font-size:140px;font-weight:510;line-height:.98;letter-spacing:-4px;color:var(--fg-1);margin:0;max-width:1680px;word-break:keep-all;text-wrap:pretty}
.hook-title .smart{color:var(--fg-3);font-style:italic;font-weight:400}
.hook-title .q{color:var(--brand-primary);font-style:italic;font-weight:400}
.hook-footnote{margin-top:96px;font-family:var(--font-mono);font-size:24px;color:var(--fg-4);letter-spacing:.06em;display:flex;align-items:center;gap:14px;animation:rise 1s 1.1s both}

/* What */
.what{display:grid;grid-template-columns:1fr 1fr;gap:72px;padding:92px 112px;background:var(--bg-marketing-deep)}
.what-left{display:flex;flex-direction:column}
.what-title{font-size:80px;font-weight:510;line-height:1.04;letter-spacing:-2.2px;color:var(--fg-1);margin:0 0 32px 0;word-break:keep-all}
.what-title .crossed{position:relative;color:var(--fg-3);text-decoration:line-through;text-decoration-color:var(--status-danger);text-decoration-thickness:6px}
.what-title .becomes{color:var(--brand-primary);font-style:italic;font-weight:400}
.what-body{font-size:26px;line-height:1.5;color:var(--fg-2);letter-spacing:-.2px;margin:0 0 28px 0}
.what-body strong{color:var(--fg-1);font-weight:510}
.what-pillars{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:auto}
.what-pillar{background:var(--surface-alpha-2);border:1px solid var(--border-default);border-radius:12px;padding:20px 22px;backdrop-filter:blur(10px)}
.what-pillar .k{font-family:var(--font-mono);font-size:20px;color:var(--fg-4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.what-pillar .v{font-size:26px;font-weight:510;color:var(--fg-1);letter-spacing:-.2px;line-height:1.2}
.what-pillar .v .s{font-size:19px;color:var(--fg-3);font-weight:400}
.what-slogan{margin-top:20px;padding:20px 22px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.07);font-size:26px;line-height:1.3;font-weight:510;letter-spacing:-.3px;color:var(--fg-1);backdrop-filter:blur(6px)}
.what-slogan em{color:var(--brand-primary);font-style:italic;font-weight:400}
.what-right{position:relative;height:100%;min-height:720px}

/* How-single */
.how-single{padding:92px 112px 112px;display:flex;flex-direction:column;gap:48px}
.how-single-hd{display:flex;align-items:center;gap:24px}
.how-single-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:9999px;font-family:var(--font-mono);font-size:22px;color:var(--fg-3);background:var(--surface-alpha-3);border:1px solid var(--border-default);letter-spacing:.04em;margin-left:auto}
.how-single-pill .n{color:var(--brand-primary);font-weight:510}
.how-single-body{display:grid;grid-template-columns:2fr 3fr;gap:80px;flex:1;align-items:center}
.how-single-left{display:flex;flex-direction:column;gap:28px}
.how-single-title{font-size:96px;font-weight:510;line-height:1.02;letter-spacing:-2.8px;color:var(--fg-1);margin:0;word-break:keep-all}
.how-single-title em{color:var(--brand-primary);font-style:italic;font-weight:400}
.how-single-p{font-size:28px;line-height:1.55;color:var(--fg-3);letter-spacing:-.2px;margin:0}
.how-single-p strong{color:var(--fg-1);font-weight:510}
.how-single-right{display:flex;align-items:center;justify-content:center;width:100%}

/* Flow-viz (Dynamic Rules slide) */
.flow-viz{background:var(--bg-panel);border:1px solid var(--border-default);border-radius:14px;overflow:hidden;width:100%}
.flow-viz-head{display:flex;gap:8px;align-items:center;padding:16px 22px;border-bottom:1px solid var(--border-subtle);background:var(--surface-alpha-1)}
.flow-viz-head .d{width:11px;height:11px;border-radius:50%;background:var(--border-strong)}
.flow-viz-head .t{margin-left:auto;font-family:var(--font-mono);font-size:18px;color:var(--brand-primary);display:flex;align-items:center;gap:8px}
.flow-viz-head .t::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--status-success);animation:pulse-dot 2s infinite}
.flow-viz-steps{padding:36px 28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-family:var(--font-mono)}
.flow-viz-node{background:var(--bg-surface);border:1px solid var(--border-strong);padding:16px 20px;border-radius:10px;font-size:24px;color:var(--fg-2);white-space:nowrap}
.flow-viz-node.new{border-color:var(--brand-primary);color:var(--brand-primary);background:rgba(6,182,212,.08);animation:node-pulse 1.8s ease-in-out infinite}
.flow-viz-ar{color:var(--brand-primary);font-size:24px;padding:0 4px}
@keyframes node-pulse{0%,100%{box-shadow:0 0 0 0 rgba(6,182,212,.45);transform:scale(1)}50%{box-shadow:0 0 0 10px rgba(6,182,212,0);transform:scale(1.04)}}

/* HITL-viz (Human-in-the-Loop slide) */
.hitl-viz{background:#000;border:1px solid var(--border-strong);border-radius:16px;padding:40px 40px 44px;color:#fff;display:flex;flex-direction:column;gap:24px;box-shadow:0 20px 60px rgba(0,0,0,.7);width:100%}
.hitl-viz-tag{font-family:var(--font-mono);font-size:20px;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;display:flex;gap:10px;align-items:center}
.hitl-viz-tag::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--brand-primary);box-shadow:0 0 0 5px rgba(6,182,212,.2);animation:pulse-dot 1.8s infinite}
.hitl-viz-msg{font-size:30px;line-height:1.4;letter-spacing:-.2px}
.hitl-viz-acts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.hitl-viz-acts .btn{padding:20px;border-radius:10px;font-size:24px;font-weight:510;text-align:center}
.hitl-viz-acts .btn.approve{background:var(--status-success);color:#fff;animation:approve-breathe 2.6s ease-in-out infinite}
.hitl-viz-acts .btn.changes{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}

/* Arch-flow diagram (Memo-Webhook slide) */
.arch-flow{border-radius:10px;overflow:hidden;background:rgba(6,10,20,.5);border:1px solid var(--border-default);width:100%}
.arch-flow svg{display:block;width:100%;height:auto}

/* Story */
.story{display:grid;grid-template-columns:1fr 1fr;gap:72px;padding:92px 112px}
.story-left{display:flex;flex-direction:column}
.story-title{font-size:80px;font-weight:510;line-height:1.04;letter-spacing:-2.2px;color:var(--fg-1);margin:0 0 32px 0;word-break:keep-all}
.story-title em{color:var(--brand-primary);font-style:italic;font-weight:400}
.story-body{font-size:26px;line-height:1.5;color:var(--fg-2);letter-spacing:-.2px;margin:0 0 28px 0}
.story-body strong{color:var(--fg-1);font-weight:510}
.story-insight{margin-top:auto;padding:24px 26px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.07);font-size:26px;line-height:1.4;font-weight:510;letter-spacing:-.3px;color:var(--fg-1);backdrop-filter:blur(6px)}
.story-insight em{color:var(--brand-primary);font-style:italic;font-weight:400}
.story-right{display:flex;flex-direction:column;gap:20px;justify-content:center}
.story-stat{background:rgba(12,16,25,.72);border:1px solid var(--border-default);border-radius:16px;padding:28px 36px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(14px);animation:rise .9s both}
.story-stat:nth-child(1){animation-delay:.1s}.story-stat:nth-child(2){animation-delay:.25s}.story-stat:nth-child(3){animation-delay:.4s}
.story-stat .num{font-size:72px;font-weight:510;line-height:1;letter-spacing:-2px;color:var(--fg-1)}
.story-stat .num em{color:var(--brand-primary);font-style:normal}
.story-stat .meta{text-align:right}
.story-stat .lbl{font-family:var(--font-mono);font-size:20px;color:var(--fg-3);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px}
.story-stat .sub{font-size:22px;color:var(--fg-4);letter-spacing:-.1px}
.story-badge{padding:16px 22px;border-radius:12px;background:rgba(6,182,212,.08);border:1px dashed rgba(6,182,212,.3);font-family:var(--font-mono);font-size:20px;color:var(--brand-primary);letter-spacing:.03em;text-align:center;animation:rise .9s .6s both}
/* ============================================================
   AGENT TEAM slide
============================================================ */
.agents{padding:80px 112px 92px;display:flex;flex-direction:column}
.agents-intro{margin-bottom:36px}
.agents-cdd{font-size:26px;line-height:1.45;color:var(--fg-3);margin-top:18px;font-style:italic;padding:16px 22px;border-left:3px solid var(--brand-primary);background:rgba(6,182,212,.05)}
.agents-cdd em{color:var(--fg-1);font-style:normal;font-weight:510}
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex:0 0 500px}
.agent-card{background:rgba(15,16,17,.75);border:1px solid var(--border-default);border-radius:16px;padding:28px 28px 32px;display:flex;flex-direction:column;gap:12px;backdrop-filter:blur(14px);animation:rise .9s both}
.agent-card:nth-child(1){animation-delay:.1s}.agent-card:nth-child(2){animation-delay:.25s}.agent-card:nth-child(3){animation-delay:.4s}
.agent-top{display:flex;align-items:center;gap:10px}
.agent-photo{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border-strong);flex-shrink:0}
.agent-name{font-size:30px;font-weight:510;letter-spacing:-.4px;color:var(--fg-1)}
.agent-badges{display:flex;gap:7px;flex-wrap:wrap}
.agent-badge{font-family:var(--font-mono);font-size:15px;padding:4px 10px;border-radius:9999px;border:1px solid var(--border-default);color:var(--fg-3)}
.agent-badge.po{border-color:rgba(6,182,212,.5);color:var(--brand-primary);background:rgba(6,182,212,.08)}
.agent-badge.dev{border-color:rgba(16,185,129,.5);color:#10b981;background:rgba(16,185,129,.08)}
.agent-badge.qa{border-color:rgba(255,149,0,.5);color:#ff9500;background:rgba(255,149,0,.08)}
.agent-badge.gpt{border-color:rgba(25,195,125,.4);color:#13c48a;background:rgba(25,195,125,.06)}
.agent-origin{font-family:var(--font-mono);font-size:17px;color:var(--fg-4);letter-spacing:.02em}
.agent-body{font-size:20px;line-height:1.5;color:var(--fg-3);margin:0;flex:1}
.agent-body strong{color:var(--fg-1);font-weight:510}
.agent-quote{font-size:19px;font-style:italic;color:var(--brand-primary);padding:12px 15px;background:rgba(6,182,212,.06);border-left:2px solid var(--brand-primary);border-radius:0 8px 8px 0;margin-top:auto;line-height:1.4}
.agent-note{font-family:var(--font-mono);font-size:14px;color:var(--fg-4);padding:8px 12px;background:rgba(255,149,0,.04);border-radius:8px;border:1px solid rgba(255,149,0,.15);line-height:1.5}
.agent-note strong{color:rgba(255,149,0,.85);font-weight:500}
/* ============================================================
   DIAGRAM slides (Service Concept · System Architecture)
============================================================ */
.diag{padding:64px 96px 80px;display:flex;flex-direction:column;gap:24px}
.diag-head{display:flex;flex-direction:column;gap:8px}
.diag-kicker{font-family:var(--font-mono);font-size:16px;color:var(--brand-light);letter-spacing:.18em;text-transform:uppercase}
.diag-title{font-size:54px;font-weight:510;letter-spacing:-.6px;line-height:1.1;color:var(--fg-1);margin:0}
.diag-title em{color:var(--brand-primary);font-style:normal}
.diag-sub{font-size:22px;line-height:1.5;color:var(--fg-3);max-width:1200px}
.diag-stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.92);border:1px solid var(--border-default);border-radius:18px;padding:24px;backdrop-filter:blur(8px);overflow:hidden;animation:rise 1s both}
.diag-stage img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain}
.diag-stage--raw{background:none;border:none;backdrop-filter:none;border-radius:0;padding:0}
.diag-stage--raw img{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
<div class="progress-track"><div class="progress-bar" id="progress" style="width:5%"></div></div>
<div class="stage-outer"><div id="root"></div></div>
<div class="hud" id="hud">
  <button class="btn" data-action="prev" title="Prev (←)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
  </button>
  <span class="count"><span id="curr">01</span><span class="sep">/</span><span id="total">20</span></span>
  <button class="btn" data-action="next" title="Next (→)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg>
  </button>
  <span class="sep">·</span>
  <span class="label" id="label">Cover</span>
  <span class="sep">·</span>
  <button class="btn" data-action="full" title="Fullscreen (F)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"/></svg>
  </button>
  <button class="btn" data-action="home" title="First (Home)">⇤</button>
  <button class="btn" data-action="end" title="Last (End)">⇥</button>
</div>
