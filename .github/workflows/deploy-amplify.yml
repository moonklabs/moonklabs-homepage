name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: amplify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: |
          npm run build
          test -f out/index.html
          cd out
          zip -r ../site.zip .

      - name: Upload and start Amplify deployment
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT_JSON=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH")

          JOB_ID=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["jobId"])' <<< "$DEPLOYMENT_JSON")
          ZIP_UPLOAD_URL=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["zipUploadUrl"])' <<< "$DEPLOYMENT_JSON")

          curl --fail --silent --show-error \
            -H 'Content-Type: application/zip' \
            --upload-file site.zip \
            "$ZIP_UPLOAD_URL"

          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "$JOB_ID" >/dev/null

          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Amplify deployment
        shell: bash
        run: |
          set -euo pipefail

          JOB_ID='${{ steps.deploy.outputs.job_id }}'

          for attempt in {1..60}; do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)

            echo "Attempt $attempt: $STATUS"

            case "$STATUS" in
              SUCCEED)
                exit 0
                ;;
              FAILED|CANCELLED)
                aws amplify get-job \
                  --app-id "$AMPLIFY_APP_ID" \
                  --branch-name "$AMPLIFY_BRANCH" \
                  --job-id "$JOB_ID"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Amplify deployment timed out"
          exit 1

      - name: Print deployed URL
        shell: bash
        run: |
          set -euo pipefail
          WEB_URL=$(aws amplify get-branch \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --query 'branch.webUrl' \
            --output text)
          echo "Deployed URL: https://$WEB_URL"
